<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universo Canino – Nav</title>
  <style>
    :root {
      --cream: #fdf6ec;
      --accent: #e94560;
      --dark: #1a1a2e;
      --text: #333;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, serif;
      background: var(--cream);
      min-height: 100vh;
    }

    /* ── NAVBAR ─────────────────────────────────────── */
    #navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 70px;
      background: var(--cream);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.25rem;
      color: var(--accent);
      font-weight: bold;
      letter-spacing: 0.02em;
    }

    .nav-logo img { width: 38px; }

    /* ── LINKS ────────────────────────────────────────── */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      list-style: none;
    }

    .nav-links a {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0.5rem 0.75rem;
      text-decoration: none;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 8px;
      transition: color 0.2s;
      overflow: visible;
    }

    .nav-links a:hover { color: var(--accent); }

    /* paw icon */
    .paw-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
    .paw-icon .pad  { fill: var(--accent); }
    .paw-icon .toe  { fill: var(--accent); }

    /* trailing paws on hover */
    .paw-trail {
      display: none;
      position: absolute;
      left: -24px;
      top: 50%;
      transform: translateY(-50%);
      flex-direction: column;
      gap: 2px;
      pointer-events: none;
    }
    .trail-paw { width: 14px; height: 14px; }

    .nav-links a:hover .paw-trail { display: flex; }

    /* ── HAMBURGER ───────────────────────────────────── */
    .nav-burger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      transition: background 0.2s;
      z-index: 101;
    }

    .nav-burger:hover { background: rgba(233,69,96,0.08); }

    .nav-burger span {
      display: block;
      height: 3px;
      background: var(--accent);
      border-radius: 3px;
      transition: transform 0.35s cubic-bezier(.4,0,.2,1),
                  opacity   0.25s ease,
                  width     0.3s ease;
      transform-origin: center;
    }

    .nav-burger span:nth-child(1) { width: 100%; }
    .nav-burger span:nth-child(2) { width: 75%; }
    .nav-burger span:nth-child(3) { width: 55%; }

    /* open state */
    .nav-burger.open span:nth-child(1) {
      transform: translateY(8px) rotate(45deg);
      width: 100%;
    }
    .nav-burger.open span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    .nav-burger.open span:nth-child(3) {
      transform: translateY(-8px) rotate(-45deg);
      width: 100%;
    }

    /* ── MOBILE MENU ─────────────────────────────────── */
    @media (max-width: 768px) {
      .nav-burger { display: flex; }

      .nav-links {
        position: fixed;
        top: 70px;
        left: 0;
        right: 0;
        background: var(--cream);
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        padding: 1rem 1.5rem 1.5rem;
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        border-top: 2px solid rgba(233,69,96,0.15);

        /* hidden by default */
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
        transition: max-height 0.4s cubic-bezier(.4,0,.2,1),
                    opacity    0.3s ease;
      }

      .nav-links.open {
        max-height: 400px;
        opacity: 1;
        pointer-events: auto;
      }

      .nav-links li { border-bottom: 1px solid rgba(233,69,96,0.1); }
      .nav-links li:last-child { border-bottom: none; }

      .nav-links a {
        padding: 0.9rem 0.5rem;
        font-size: 1.05rem;
        border-radius: 0;
      }

      .paw-trail { display: none !important; }
    }
  </style>
</head>

<script>
  const burger   = document.getElementById('navBurger');
  const navLinks = document.getElementById('navLinks');

  burger.addEventListener('click', () => {
    const isOpen = navLinks.classList.toggle('open');
    burger.classList.toggle('open', isOpen);
    burger.setAttribute('aria-expanded', isOpen);
  });

  // Cerrar al hacer click en un enlace
  navLinks.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('open');
      burger.classList.remove('open');
      burger.setAttribute('aria-expanded', false);
    });
  });

  // Cerrar al hacer click fuera
  document.addEventListener('click', (e) => {
    if (!burger.contains(e.target) && !navLinks.contains(e.target)) {
      navLinks.classList.remove('open');
      burger.classList.remove('open');
      burger.setAttribute('aria-expanded', false);
    }
  });
</script>
